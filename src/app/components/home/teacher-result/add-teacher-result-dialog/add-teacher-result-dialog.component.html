<div class="bg-white dark:bg-neutral-800 rounded-lg max-h-[90vh] flex flex-col">
  <!-- Header -->
  <div class="flex justify-between items-center p-6 border-b border-gray-200 dark:border-gray-700">
    <h2 class="text-xl font-bold text-primary dark:text-success flex items-center gap-2">
      <i class="fas fa-chart-line"></i>
      {{ data.isEdit ? 'تعديل' : 'إضافة' }} نتيجة مُعلِم
    </h2>
    <button 
      type="button"
      (click)="onCancel()"
      class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors"
    >
      <i class="fas fa-times text-xl"></i>
    </button>
  </div>

  <!-- Content - Scrollable -->
  <div class="p-6 overflow-y-auto flex-1">
    <form [formGroup]="teacherResultForm" class="space-y-8">
      
      <!-- Basic Information Section -->
      <div>
        <h3 class="text-lg font-bold text-gray-800 dark:text-gray-200 mb-4 pb-2 border-b-2 border-primary flex items-center gap-2">
          <i class="fas fa-info-circle"></i>
          المعلومات الأساسية
        </h3>
        <div class="space-y-5">
          <!-- Teacher Selection -->
          <div>
            <label for="teacher" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              المُعلِم <span class="text-red-500">*</span>
            </label>
            <select 
              id="teacher"
              formControlName="teacher"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            >
              <option [ngValue]="null">اختر المُعلِم</option>
              <option *ngFor="let teacher of teachers" [ngValue]="teacher">
                {{ teacher.fullName }}
              </option>
            </select>
            <div *ngIf="teacherResultForm.get('teacher')?.invalid && teacherResultForm.get('teacher')?.touched" 
                 class="text-red-500 text-sm mt-1 flex items-center gap-1">
              <i class="fas fa-exclamation-circle"></i>
              <span>يجب اختيار المُعلِم</span>
            </div>
          </div>

          <!-- Dates Grid -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <mat-form-field class="w-full" appearance="outline">
                <mat-label>تاريخ السؤال <span class="text-red-500">*</span></mat-label>
                <input 
                  matInput 
                  [matDatepicker]="resultDatePicker"
                  formControlName="resultDate"
                  placeholder="اختر التاريخ"
                />
                <mat-datepicker-toggle matIconSuffix [for]="resultDatePicker"></mat-datepicker-toggle>
                <mat-datepicker #resultDatePicker></mat-datepicker>
              </mat-form-field>
            </div>

            <div>
              <mat-form-field class="w-full" appearance="outline">
                <mat-label>تاريخ حساب النتيجة</mat-label>
                <input 
                  matInput 
                  [matDatepicker]="calculationDatePicker"
                  formControlName="resultCalculationDate"
                  placeholder="اختر التاريخ"
                />
                <mat-datepicker-toggle matIconSuffix [for]="calculationDatePicker"></mat-datepicker-toggle>
                <mat-datepicker #calculationDatePicker></mat-datepicker>
              </mat-form-field>
            </div>
          </div>
        </div>
      </div>

      <!-- Memorization Section -->
      <div>
        <h3 class="text-lg font-bold text-gray-800 dark:text-gray-200 mb-4 pb-2 border-b-2 border-primary flex items-center gap-2">
          <i class="fas fa-book-open"></i>
          بيانات التسميع
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <div>
            <label for="memorizationCount" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              عدد طلاب التسميع <span class="text-red-500">*</span>
            </label>
            <input
              id="memorizationCount"
              type="number"
              formControlName="memorizationCount"
              min="0"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>

          <div>
            <label for="memorizationSuccessCount" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              عدد الناجحين فى التسميع <span class="text-red-500">*</span>
            </label>
            <input
              id="memorizationSuccessCount"
              type="number"
              formControlName="memorizationSuccessCount"
              min="0"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>

          <div>
            <label for="memorizationStudentCount" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              إجمالى طلاب التسميع <span class="text-red-500">*</span>
            </label>
            <input
              id="memorizationStudentCount"
              type="number"
              formControlName="memorizationStudentCount"
              min="0"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>
        </div>
      </div>

      <!-- Revision Section -->
      <div>
        <h3 class="text-lg font-bold text-gray-800 dark:text-gray-200 mb-4 pb-2 border-b-2 border-primary flex items-center gap-2">
          <i class="fas fa-redo"></i>
          بيانات المراجعة
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <div>
            <label for="revisionCount" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              عدد طلاب المراجعة <span class="text-red-500">*</span>
            </label>
            <input
              id="revisionCount"
              type="number"
              formControlName="revisionCount"
              min="0"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>

          <div>
            <label for="revisionSuccessCount" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              عدد الناجحين فى المراجعة <span class="text-red-500">*</span>
            </label>
            <input
              id="revisionSuccessCount"
              type="number"
              formControlName="revisionSuccessCount"
              min="0"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>

          <div>
            <label for="revisionStudentCount" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              إجمالى طلاب المراجعة <span class="text-red-500">*</span>
            </label>
            <input
              id="revisionStudentCount"
              type="number"
              formControlName="revisionStudentCount"
              min="0"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>
        </div>
      </div>

      <!-- Questions Section -->
      <div>
        <h3 class="text-lg font-bold text-gray-800 dark:text-gray-200 mb-4 pb-2 border-b-2 border-primary flex items-center gap-2">
          <i class="fas fa-question-circle"></i>
          نتائج الأسئلة
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
          <div>
            <label for="firstQuestionSuccessCount" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              عدد الناجحين فى السؤال الأول
            </label>
            <input
              id="firstQuestionSuccessCount"
              type="number"
              formControlName="firstQuestionSuccessCount"
              min="0"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>

          <div>
            <label for="secondQuestionSuccessCount" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              عدد الناجحين فى السؤال الثانى
            </label>
            <input
              id="secondQuestionSuccessCount"
              type="number"
              formControlName="secondQuestionSuccessCount"
              min="0"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>

          <div>
            <label for="thirdQuestionSuccessCount" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              عدد الناجحين فى السؤال الثالث
            </label>
            <input
              id="thirdQuestionSuccessCount"
              type="number"
              formControlName="thirdQuestionSuccessCount"
              min="0"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>
        </div>
      </div>

      <!-- Percentages Section -->
      <div>
        <h3 class="text-lg font-bold text-gray-800 dark:text-gray-200 mb-4 pb-2 border-b-2 border-primary flex items-center gap-2">
          <i class="fas fa-percentage"></i>
          النسب المئوية والتقييم
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label for="memorizationPercentage" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              نسبة التسميع
            </label>
            <input
              id="memorizationPercentage"
              type="number"
              formControlName="memorizationPercentage"
              step="0.01"
              min="0"
              max="100"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>

          <div>
            <label for="revisionPercentage" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              نسبة المراجعة
            </label>
            <input
              id="revisionPercentage"
              type="number"
              formControlName="revisionPercentage"
              step="0.01"
              min="0"
              max="100"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>

          <div>
            <label for="adjustmentValue" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              قيمة التعديل
            </label>
            <input
              id="adjustmentValue"
              type="number"
              formControlName="adjustmentValue"
              step="0.01"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>

          <div>
            <label for="successPercentage" class="block mb-2 text-sm font-semibold text-gray-700 dark:text-gray-300">
              إجمالى نسبة النجاح
            </label>
            <input
              id="successPercentage"
              type="number"
              formControlName="successPercentage"
              step="0.01"
              min="0"
              max="100"
              class="w-full rounded-lg border border-gray-300 dark:border-gray-700 px-4 py-3 bg-white dark:bg-neutral-900 text-text dark:text-dark-text focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
            />
          </div>
        </div>
      </div>
    </form>
  </div>

  <!-- Actions -->
  <div class="p-6 border-t border-gray-200 dark:border-gray-700 flex justify-end gap-3">
    <button
      type="button"
      (click)="onCancel()"
      class="px-6 py-3 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-700 transition-colors font-semibold"
    >
      إلغاء
    </button>
    <button
      type="button"
      (click)="onSubmit()"
      [disabled]="teacherResultForm.invalid"
      class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-hover disabled:opacity-50 disabled:cursor-not-allowed transition-colors font-semibold shadow-md hover:shadow-lg"
    >
      {{ data.isEdit ? 'تحديث' : 'إضافة' }}
    </button>
  </div>
</div>
