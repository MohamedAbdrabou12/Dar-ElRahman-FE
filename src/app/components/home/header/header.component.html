<!-- header.component.html -->
<nav class="bg-white dark:bg-neutral-800 border-b border-gray-200 dark:border-gray-700 px-6 py-4 flex justify-between items-center shadow-sm">
  <h1 class="text-xl font-bold text-primary dark:text-success flex items-center gap-2">
    <i class="fas fa-mosque"></i>
    دار عبد الرحمن
  </h1>

  <!-- User Profile Dropdown -->
  <div class="relative">
    <button
      (click)="toggleDropdown()"
      class="flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-700 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary dark:focus:ring-success"
    >
      <div class="w-10 h-10 rounded-full bg-primary dark:bg-success flex items-center justify-center text-white font-bold overflow-hidden">
        <img *ngIf="profilePictureUrl" [src]="profilePictureUrl" alt="profile" class="w-full h-full object-cover" />
        <i *ngIf="!profilePictureUrl" [class]="getDefaultAvatar()"></i>
      </div>
      <span class="text-gray-900 dark:text-gray-100 font-semibold hidden md:block">{{ currentUser }}</span>
      <i class="fas fa-chevron-down text-gray-600 dark:text-gray-400 text-sm" [class.rotate-180]="isDropdownOpen"></i>
    </button>

    <!-- Dropdown Menu -->
    <div
      *ngIf="isDropdownOpen"
      class="absolute left-0 mt-2 w-64 bg-white dark:bg-neutral-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 py-2 z-50 animate-fade-in-up"
    >
      <!-- User Info Section -->
      <div class="px-4 py-3 border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center gap-3 mb-2">
          <div class="relative group">
            <div class="w-14 h-14 rounded-full bg-primary dark:bg-success flex items-center justify-center text-white font-bold text-lg overflow-hidden">
              <img *ngIf="profilePictureUrl" [src]="profilePictureUrl" alt="profile" class="w-full h-full object-cover" />
              <i *ngIf="!profilePictureUrl" [class]="getDefaultAvatar()" class="text-xl"></i>
            </div>
            <label class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-full opacity-0 group-hover:opacity-100 cursor-pointer transition-opacity duration-200">
              <i class="fas fa-camera text-white text-xs" *ngIf="!isUploadingPicture"></i>
              <i class="fas fa-spinner fa-spin text-white text-xs" *ngIf="isUploadingPicture"></i>
              <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)" />
            </label>
          </div>
          <div class="flex-1">
            <p class="text-sm font-semibold text-gray-900 dark:text-gray-100">{{ currentUser }}</p>
            <p class="text-xs text-gray-600 dark:text-gray-400">{{ userEmail }}</p>
          </div>
        </div>
      </div>

      <!-- Logout Button -->
      <button
        (click)="logout()"
        class="w-full px-4 py-3 flex items-center gap-3 hover:bg-gray-100 dark:hover:bg-neutral-700 transition-all duration-200 text-right"
      >
        <i class="fas fa-sign-out-alt text-red-500"></i>
        <span class="text-gray-900 dark:text-gray-100 font-medium">تسجيل الخروج</span>
      </button>
    </div>
  </div>
</nav>
