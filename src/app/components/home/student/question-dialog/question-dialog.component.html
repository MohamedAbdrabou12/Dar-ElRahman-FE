<div class="bg-white dark:bg-neutral-800 rounded-lg max-h-[90vh] flex flex-col">
  <!-- Header -->
  <div class="flex justify-between items-center p-6 border-b border-gray-200 dark:border-gray-700">
    <h2 class="text-xl font-bold text-primary dark:text-success flex items-center gap-2">
      <i class="fas fa-book-quran"></i>
      سور القرآن
    </h2>
    <div class="flex items-center gap-2">
      <button
        *ngIf="studentSurahs && studentSurahs.length > 0"
        type="button"
        class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-hover transition-all text-sm font-semibold flex items-center gap-2 shadow-sm"
        (click)="printSurahReport()"
      >
        <i class="fas fa-print"></i>
        طباعة
      </button>
      <button
        type="button"
        mat-dialog-close
        class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 transition-colors"
      >
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="p-6 overflow-y-auto flex-1">
    @if (!studentSurahs || studentSurahs.length === 0) {
      <div class="p-12 text-center">
        <i class="fas fa-book-quran text-6xl text-gray-300 dark:text-gray-600 mb-4"></i>
        <h3 class="text-lg font-semibold text-gray-600 dark:text-gray-400">لم يتم الاختبار في أي سورة حتى الآن</h3>
      </div>
    } @else {
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
        @for (completedSurah of studentSurahs; track completedSurah.surah) {
          <app-surah-date
            [surah]="completedSurah.surah"
            [successDate]="completedSurah.successDate"
            [grade]="completedSurah.grade"
          />
        }
      </div>
    }
  </div>

  <!-- Actions -->
  <div class="p-6 border-t border-gray-200 dark:border-gray-700 flex justify-end">
    <button
      type="button"
      mat-dialog-close
      class="px-6 py-3 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-100 dark:hover:bg-neutral-700 transition-colors font-semibold"
    >
      إغلاق
    </button>
  </div>
</div>
