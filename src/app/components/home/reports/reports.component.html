<div class="space-y-6">
  <!-- Page Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100 flex items-center gap-3">
        <i class="fas fa-file-alt text-primary"></i>
        التقارير
      </h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">تصدير التقارير بصيغة PDF أو CSV</p>
    </div>
  </div>

  <!-- Category Tabs -->
  <div class="flex flex-wrap gap-2">
    <button
      *ngFor="let cat of categories"
      (click)="selectCategory(cat.key)"
      class="px-5 py-2.5 rounded-xl text-sm font-semibold transition-all duration-300 flex items-center gap-2 border"
      [ngClass]="{
        'bg-primary text-white border-primary shadow-sm': activeCategory === cat.key,
        'bg-white dark:bg-neutral-800 text-gray-600 dark:text-gray-300 border-gray-200 dark:border-neutral-700 hover:border-primary/40 hover:text-primary': activeCategory !== cat.key
      }"
    >
      <i [class]="cat.icon"></i>
      {{ cat.label }}
    </button>
  </div>

  <!-- Date Range Filter -->
  <div class="bg-white dark:bg-neutral-800 rounded-xl shadow-sm border border-gray-100 dark:border-neutral-700 p-4">
    <div class="flex flex-wrap items-end gap-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 dark:text-gray-400">من تاريخ</label>
        <input
          type="date"
          [(ngModel)]="dateFrom"
          class="px-3 py-2 border border-gray-200 dark:border-neutral-600 rounded-lg bg-gray-50 dark:bg-neutral-900 text-gray-700 dark:text-gray-200 text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-gray-500 dark:text-gray-400">إلى تاريخ</label>
        <input
          type="date"
          [(ngModel)]="dateTo"
          class="px-3 py-2 border border-gray-200 dark:border-neutral-600 rounded-lg bg-gray-50 dark:bg-neutral-900 text-gray-700 dark:text-gray-200 text-sm focus:ring-2 focus:ring-primary/30 focus:border-primary outline-none transition-all"
        />
      </div>
    </div>
  </div>

  <!-- Report Cards -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
    <div
      *ngFor="let report of filteredReports"
      class="bg-white dark:bg-neutral-800 rounded-xl shadow-sm border border-gray-100 dark:border-neutral-700 p-5 hover:shadow-lg hover:border-primary/30 dark:hover:border-primary/30 transition-all duration-300"
    >
      <!-- Report Header -->
      <div class="flex items-center gap-3 mb-4">
        <div class="w-11 h-11 rounded-xl bg-primary/10 dark:bg-primary/20 flex items-center justify-center">
          <i [class]="report.icon" class="text-primary text-lg"></i>
        </div>
        <h3 class="text-sm font-bold text-gray-800 dark:text-gray-100">{{ report.label }}</h3>
      </div>

      <!-- Tags -->
      <div class="flex flex-wrap gap-1.5 mb-4">
        <span *ngIf="report.hasDateRange"
              class="px-2 py-0.5 text-[10px] font-semibold rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 border border-blue-100 dark:border-blue-800">
          <i class="fas fa-calendar-alt me-1"></i>نطاق زمني
        </span>
        <span *ngIf="report.hasPeriodFilter"
              class="px-2 py-0.5 text-[10px] font-semibold rounded-full bg-violet-50 dark:bg-violet-900/30 text-violet-600 dark:text-violet-400 border border-violet-100 dark:border-violet-800">
          <i class="fas fa-filter me-1"></i>فترة
        </span>
      </div>

      <!-- Download Buttons -->
      <div class="flex gap-2">
        <button
          (click)="download(report, 'PDF')"
          [disabled]="isDownloading(report.key, 'PDF')"
          class="flex-1 px-3 py-2 bg-red-500 hover:bg-red-600 text-white text-xs font-semibold rounded-lg transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-50 shadow-sm"
        >
          <i class="fas fa-file-pdf" [class.fa-spin]="isDownloading(report.key, 'PDF')" [class.fa-spinner]="isDownloading(report.key, 'PDF')"></i>
          <span *ngIf="!isDownloading(report.key, 'PDF')">PDF</span>
          <span *ngIf="isDownloading(report.key, 'PDF')">جاري...</span>
        </button>
        <button
          (click)="download(report, 'CSV')"
          [disabled]="isDownloading(report.key, 'CSV')"
          class="flex-1 px-3 py-2 bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-semibold rounded-lg transition-all duration-300 flex items-center justify-center gap-2 disabled:opacity-50 shadow-sm"
        >
          <i class="fas fa-file-csv" [class.fa-spin]="isDownloading(report.key, 'CSV')" [class.fa-spinner]="isDownloading(report.key, 'CSV')"></i>
          <span *ngIf="!isDownloading(report.key, 'CSV')">CSV</span>
          <span *ngIf="isDownloading(report.key, 'CSV')">جاري...</span>
        </button>
      </div>

      <!-- Error Message -->
      <div *ngIf="getError(report.key, 'PDF') || getError(report.key, 'CSV')"
           class="mt-2 text-xs text-red-500 dark:text-red-400 text-center">
        <i class="fas fa-exclamation-circle me-1"></i>
        {{ getError(report.key, 'PDF') || getError(report.key, 'CSV') }}
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="filteredReports.length === 0"
       class="bg-white dark:bg-neutral-800 rounded-xl shadow-sm border border-gray-100 dark:border-neutral-700 p-12 text-center">
    <i class="fas fa-folder-open text-gray-300 dark:text-neutral-600 text-5xl mb-4"></i>
    <p class="text-gray-500 dark:text-gray-400 font-semibold">لا توجد تقارير في هذه الفئة</p>
  </div>
</div>
