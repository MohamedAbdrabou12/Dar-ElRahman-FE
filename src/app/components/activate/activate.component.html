<div
  class="flex items-center justify-center min-h-screen bg-background dark:bg-dark-background transition-colors duration-300 px-4"
>
  <div
    class="flex flex-col w-full max-w-lg bg-white dark:bg-neutral-800 rounded-2xl shadow-xl overflow-hidden animate-fade-in-up transition-all duration-500 p-8 space-y-6"
  >
    <!-- Logo Section -->
    <div class="flex flex-col items-center mb-4 animate-fade-in-up delay-100">
      <img src="../../../assets/imgs/logo3.png" alt="Logo" class="w-20 h-20 mb-4 object-contain" />
      <h1 class="text-2xl font-bold text-text dark:text-dark-text mb-1">
        تفعيل الحساب
      </h1>
    </div>

    <!-- Token Error State -->
    <div *ngIf="tokenError" class="text-center space-y-4 animate-fade-in-up delay-200">
      <div class="w-16 h-16 mx-auto rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center">
        <i class="fas fa-exclamation-triangle text-red-500 text-2xl"></i>
      </div>
      <p class="text-lg text-red-600 dark:text-red-400 font-semibold">{{ tokenError }}</p>
      <a
        [routerLink]="['/', AppRoutes.LOGIN]"
        class="inline-block mt-4 px-6 py-3 bg-primary text-white font-semibold rounded-lg shadow-md hover:bg-hover hover:shadow-lg transition-all duration-300"
      >
        العودة لتسجيل الدخول
      </a>
    </div>

    <!-- Activated Success State -->
    <div *ngIf="activated" class="text-center space-y-4 animate-fade-in-up delay-200">
      <div class="w-16 h-16 mx-auto rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center">
        <i class="fas fa-check-circle text-green-500 text-3xl"></i>
      </div>
      <p class="text-lg text-green-600 dark:text-green-400 font-semibold">
        تم تفعيل حسابك بنجاح!
      </p>
      <p class="text-sm text-gray-500 dark:text-gray-400">جارٍ توجيهك لصفحة تسجيل الدخول...</p>
    </div>

    <!-- Set Password Form -->
    <div *ngIf="tokenValid && !activated && !tokenError">
      <p class="text-center text-secondary dark:text-success text-sm mb-6 animate-fade-in-up delay-100">
        مرحباً <strong>{{ fullName }}</strong>، يرجى تعيين كلمة المرور لتفعيل حسابك.
      </p>

      <form #form="ngForm" (ngSubmit)="onSubmit(form)" class="grid grid-cols-1 gap-6 animate-fade-in-up delay-200" novalidate>
        <!-- Password -->
        <div class="flex flex-col relative">
          <label
            for="password"
            class="mb-1 text-sm font-semibold text-secondary dark:text-success flex items-center gap-2"
          >
            <i class="fa-solid fa-lock w-5 h-5 text-primary dark:text-hover"></i>
            كلمة المرور
          </label>
          <div class="relative">
            <input
              #passwordInput
              [type]="showPassword ? 'text' : 'password'"
              id="password"
              [(ngModel)]="passwords.password"
              name="password"
              required
              minlength="6"
              placeholder="ادخل كلمة المرور"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700
                     bg-white dark:bg-neutral-900 text-text dark:text-dark-text
                     focus:ring-2 focus:ring-primary focus:outline-none transition-all duration-300"
            />
            <button
              type="button"
              (click)="showPassword = !showPassword"
              class="absolute top-1/2 left-3 -translate-y-1/2 text-gray-400 dark:text-gray-500 hover:text-primary dark:hover:text-dark-hover transition-colors duration-300"
            >
              <i [ngClass]="showPassword ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash'" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="flex flex-col relative">
          <label
            for="confirmPassword"
            class="mb-1 text-sm font-semibold text-secondary dark:text-success flex items-center gap-2"
          >
            <i class="fa-solid fa-lock w-5 h-5 text-primary dark:text-hover"></i>
            تأكيد كلمة المرور
          </label>
          <div class="relative">
            <input
              #confirmPasswordInput
              [type]="showConfirmPassword ? 'text' : 'password'"
              id="confirmPassword"
              [(ngModel)]="passwords.confirmPassword"
              name="confirmPassword"
              required
              placeholder="أعد إدخال كلمة المرور"
              class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700
                     bg-white dark:bg-neutral-900 text-text dark:text-dark-text
                     focus:ring-2 focus:ring-primary focus:outline-none transition-all duration-300"
            />
            <button
              type="button"
              (click)="showConfirmPassword = !showConfirmPassword"
              class="absolute top-1/2 left-3 -translate-y-1/2 text-gray-400 dark:text-gray-500 hover:text-primary dark:hover:text-dark-hover transition-colors duration-300"
            >
              <i [ngClass]="showConfirmPassword ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash'" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <div>
          <button
            type="submit"
            class="w-full py-3 bg-primary text-white font-semibold rounded-lg shadow-md
                   hover:bg-hover hover:shadow-lg focus:outline-none focus:ring-2
                   focus:ring-primary transition-all duration-300 cursor-pointer"
          >
            تفعيل الحساب
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Toast messages -->
<app-toast *ngIf="toast" [message]="toast.message" [type]="toast.type"></app-toast>

<app-loading *ngIf="loadingService.isLoading"></app-loading>
