<div class="alert-toast" [class]="'alert-toast--' + type">
  <div class="alert-toast__icon">
    <i [class]="type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-check-circle'"></i>
  </div>
  <div class="alert-toast__body">
    <span class="alert-toast__title">{{ type === 'error' ? 'خطأ' : 'تم بنجاح' }}</span>
    <span class="alert-toast__message">{{ message }}</span>
  </div>
  <button class="alert-toast__dismiss" (click)="onDismiss()">
    <i class="fas fa-times"></i>
  </button>
</div>
