<div
  class="flex items-center justify-center min-h-screen bg-background dark:bg-dark-background transition-colors duration-300 px-4"
>
  <div
    class="flex flex-col w-full max-w-lg bg-white dark:bg-neutral-800 rounded-2xl shadow-xl overflow-hidden animate-fade-in-up transition-all duration-500 p-8 space-y-6"
  >
    <!-- Logo Section -->
    <div class="flex flex-col items-center mb-4 animate-fade-in-up delay-100">
      <img src="../../../assets/imgs/logo.jpg" alt="Logo" class="w-20 h-20 mb-4 object-contain" />
      <h1 class="text-2xl font-bold text-text dark:text-dark-text mb-1">
        نسيت كلمة المرور
      </h1>
      <p class="text-sm text-secondary dark:text-success text-center">
        أدخل بريدك الإلكتروني لإرسال رابط إعادة تعيين كلمة المرور
      </p>
    </div>

    <!-- Email Sent Success State -->
    <div *ngIf="emailSent" class="text-center space-y-4 animate-fade-in-up delay-200">
      <div class="w-16 h-16 mx-auto rounded-full bg-green-100 dark:bg-green-900/30 flex items-center justify-center">
        <i class="fas fa-envelope-open-text text-green-500 text-3xl"></i>
      </div>
      <p class="text-lg text-green-600 dark:text-green-400 font-semibold">
        تم إرسال رابط إعادة تعيين كلمة المرور!
      </p>
      <p class="text-sm text-gray-500 dark:text-gray-400">
        يرجى التحقق من بريدك الإلكتروني واتباع التعليمات الموجودة في الرسالة.
      </p>
      <p class="text-sm text-gray-500 dark:text-gray-400">
        الرابط صالح لمدة 24 ساعة.
      </p>
      <a
        [routerLink]="['/', AppRoutes.LOGIN]"
        class="inline-block mt-4 px-6 py-3 bg-primary text-white font-semibold rounded-lg shadow-md hover:bg-hover hover:shadow-lg transition-all duration-300"
      >
        العودة لتسجيل الدخول
      </a>
    </div>

    <!-- Email Form -->
    <div *ngIf="!emailSent">
      <form #form="ngForm" (ngSubmit)="onSubmit(form)" class="grid grid-cols-1 gap-6 animate-fade-in-up delay-200" novalidate>
        <!-- Email -->
        <div class="flex flex-col">
          <label
            for="email"
            class="mb-1 text-sm font-semibold text-secondary dark:text-success flex items-center gap-2"
          >
            <i class="fa-solid fa-envelope w-5 h-5 text-primary dark:text-hover"></i>
            البريد الإلكتروني
          </label>
          <input
            #emailInput
            type="email"
            id="email"
            [(ngModel)]="email"
            name="email"
            required
            placeholder="ادخل البريد الإلكتروني"
            class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-700
                   bg-white dark:bg-neutral-900 text-text dark:text-dark-text
                   focus:ring-2 focus:ring-primary focus:outline-none transition-all duration-300"
          />
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="p-3 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg">
          <p class="text-red-600 dark:text-red-400 text-sm flex items-center gap-2">
            <i class="fas fa-exclamation-circle"></i>
            {{ errorMessage }}
          </p>
        </div>

        <!-- Submit Button -->
        <div>
          <button
            type="submit"
            class="w-full py-3 bg-primary text-white font-semibold rounded-lg shadow-md
                   hover:bg-hover hover:shadow-lg focus:outline-none focus:ring-2
                   focus:ring-primary transition-all duration-300 cursor-pointer"
          >
            إرسال رابط إعادة التعيين
          </button>
        </div>
      </form>

      <!-- Back to Login -->
      <p class="mt-4 text-sm text-center">
        <a
          [routerLink]="['/', AppRoutes.LOGIN]"
          class="text-primary dark:text-dark-hover hover:underline transition-all duration-300"
        >
          <i class="fas fa-arrow-right ml-1"></i>
          العودة لتسجيل الدخول
        </a>
      </p>
    </div>
  </div>
</div>

<!-- Toast messages -->
<app-toast *ngIf="toast" [message]="toast.message" [type]="toast.type"></app-toast>

<app-loading *ngIf="loadingService.isLoading"></app-loading>
